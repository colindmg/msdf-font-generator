<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MSDF Font Generator</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main>
      <h1>MSDF Font Generator</h1>
      <p class="subtitle">
        Upload a <code>.ttf</code> font → get your MSDF atlas + BMFont data
      </p>

      <div class="workspace">
        <!-- ── Left panel : Upload ── -->
        <div class="panel">
          <div class="panel__header">
            <span class="panel__dot"></span>
            <span class="panel__title">Input · TTF Font</span>
          </div>
          <div class="panel__body">
            <div id="dropzone">
              <span class="dropzone__icon">🔤</span>
              <span class="dropzone__label">
                Drop your <strong>.ttf</strong> here<br />or click to browse
              </span>
              <input type="file" id="fileInput" accept=".ttf" hidden />
            </div>

            <div class="progress-container">
              <div class="progress-track">
                <div id="progressBar" class="progress-fill"></div>
              </div>
              <span id="progressText">0%</span>
            </div>

            <p id="status" class="status status--info"></p>

            <div id="downloads" class="downloads"></div>
          </div>
        </div>

        <!-- ── Right panel : Preview ── -->
        <div class="panel preview-panel">
          <div class="panel__header">
            <span class="panel__dot"></span>
            <span class="panel__title">Output · MSDF Atlas</span>
          </div>
          <div class="panel__body">
            <div id="previewContainer" class="preview-placeholder">
              <svg
                width="48"
                height="48"
                viewBox="0 0 48 48"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <rect
                  x="4"
                  y="4"
                  width="40"
                  height="40"
                  rx="4"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  d="M14 34L20 22L26 30L30 24L34 34H14Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
                <circle
                  cx="32"
                  cy="18"
                  r="3"
                  stroke="currentColor"
                  stroke-width="2"
                />
              </svg>
              <span>Atlas preview will appear here</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
